  api.rehearsalResultJSON:
    properties:
      attempt_id:
        type: string
      binary_name:
        type: string
      binary_sha256:
        type: string
      binary_version:
        type: string
      blocks_advanced:
        type: integer
      engine_version:
        type: string
      failed_step:
        type: string
      finished_at:
        type: string
      input_set_hash:
        type: string
      outcome:
        type: string
      recorded_at:
        type: string
      stale:
        type: boolean
      started_at:
        type: string
      steps:
        items:
          $ref: '#/definitions/api.rehearsalResultStepJSON'
        type: array
      summary:
        type: string
      validators:
