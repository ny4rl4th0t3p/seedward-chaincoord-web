        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Open the application window
      tags:
      - launches
  /launch/{id}/peers:
    get:
      description: Returns peer addresses of all approved validators. Use ?format=text
        for persistent_peers format (comma-separated).
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Output format
        enum:
        - json
        - text
        in: query
        name: format
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: JSON format; with ?format=text returns comma-separated text/plain
          schema:
            $ref: '#/definitions/api.peersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Get approved validator peers
      tags:
      - readiness
  /launch/{id}/proposal:
    post:
      consumes:
      - application/json
      description: Coordinator raises a new action proposal. Rate-limited to 60 req/IP/min.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Proposal payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.RaiseInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.proposalJSON'
        "400":
