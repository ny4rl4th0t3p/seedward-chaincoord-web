            $ref: '#/definitions/api.joinRequestJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Get a join request
      tags:
      - join-requests
  /launch/{id}/join/grouped:
    get:
      description: |-
        Returns join requests grouped by the submitting hot actor, each group carrying the member label
        and per-actor aggregates (count, total self-delegation). Committee members only.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.submitterGroupJSON'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: List join requests grouped by submitter
      tags:
      - join-requests
  /launch/{id}/members:
    get:
      description: Returns the launch's members list (address + label + provenance),
        sorted by address. Committee members only.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.memberJSON'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: List launch members
      tags:
      - members
    post:
      consumes:
      - application/json
      description: |-
        Adds a hot actor address (with a label) to the launch's members list — granting see + submit access.
        Committee members only. Allowed only in DRAFT/PUBLISHED/WINDOW_OPEN. Idempotent on address.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Address and label to add
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.addMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.memberJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Add a launch member
      tags:
      - members
  /launch/{id}/members/{address}:
    delete:
      description: |-
        Removes a hot actor address from the launch's members list — revoking see + submit access.
        Committee members only. Allowed only in DRAFT/PUBLISHED/WINDOW_OPEN.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Hot actor address to remove
        in: path
        name: address
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Remove a launch member
      tags:
      - members
  /launch/{id}/open-window:
