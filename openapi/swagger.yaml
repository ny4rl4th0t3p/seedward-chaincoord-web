        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Raise a proposal
      tags:
      - proposals
  /launch/{id}/proposal/{prop_id}:
    get:
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Proposal UUID
        in: path
        name: prop_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.proposalJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Get a proposal
      tags:
      - proposals
  /launch/{id}/proposal/{prop_id}/sign:
    post:
      consumes:
      - application/json
      description: Coordinator adds their SIGN or VETO decision to a pending proposal.
        Rate-limited to 60 req/IP/min.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Proposal UUID
        in: path
        name: prop_id
        required: true
        type: string
      - description: Signing payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.SignInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.proposalJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Sign or veto a proposal
      tags:
      - proposals
  /launch/{id}/proposals:
    get:
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.pageEnvelope-array_api_proposalJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
