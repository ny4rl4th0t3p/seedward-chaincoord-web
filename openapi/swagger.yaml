        type: string
    type: object
  api.signatureEntryJSON:
    properties:
      coordinator_address:
        type: string
      decision:
        type: string
      timestamp:
        type: string
    type: object
  api.submitterGroupJSON:
    properties:
      label:
        type: string
      request_count:
        type: integer
      requests:
        items:
          $ref: '#/definitions/api.joinRequestJSON'
        type: array
      submitter_address:
        type: string
      total_self_delegation:
        type: string
    type: object
  api.tokenResponse:
    properties:
      token:
        type: string
    type: object
  api.validatorReadinessJSON:
    properties:
      binary_hash_confirmed:
        type: string
      genesis_hash_confirmed:
        type: string
      is_ready:
        type: boolean
      join_request_id:
        type: string
      last_confirmed_at:
        type: string
      moniker:
        type: string
      operator_address:
        type: string
      voting_power_pct:
        type: number
    type: object
  ports.AuditEvent:
    properties:
      event_name:
        description: EventName matches domain.DomainEvent.EventName()
        type: string
      launch_id:
        description: LaunchID scopes the event to a specific launch for per-launch
          filtering.
        type: string
      occurred_at:
        type: string
      payload:
        description: |-
          Payload is the canonical JSON of the domain event, stored as raw JSON
          so audit entries are human-readable without base64 decoding.
        type: object
      prev_hash:
        description: |-
          PrevHash is the SHA-256 hex digest of the previous entry's raw JSON bytes
          (the full marshaled line, signature included). Empty for the first entry.
          Included in the signature of the current entry so it cannot be silently altered.
        type: string
      signature:
        description: |-
          Signature is a base64 Ed25519 signature over the canonical JSON of this entry
          (excluding the signature field itself), signed by the server's audit key.
        type: string
    type: object
  proposal.ActionType:
    enum:
    - APPROVE_VALIDATOR
    - REJECT_VALIDATOR
    - REMOVE_APPROVED_VALIDATOR
    - APPROVE_ALLOCATION_FILE
    - PUBLISH_CHAIN_RECORD
    - CLOSE_APPLICATION_WINDOW
    - PUBLISH_GENESIS
    - UPDATE_GENESIS_TIME
    - REPLACE_COMMITTEE_MEMBER
    - REVISE_GENESIS
    - EXPAND_COMMITTEE
    - SHRINK_COMMITTEE
    type: string
    x-enum-varnames:
    - ActionApproveValidator
    - ActionRejectValidator
    - ActionRemoveApprovedValidator
    - ActionApproveAllocationFile
    - ActionPublishChainRecord
    - ActionCloseApplicationWindow
    - ActionPublishGenesis
    - ActionUpdateGenesisTime
    - ActionReplaceCommitteeMember
    - ActionReviseGenesis
    - ActionExpandCommittee
    - ActionShrinkCommittee
  proposal.Decision:
    enum:
    - SIGN
    - VETO
    type: string
    x-enum-varnames:
    - DecisionSign
    - DecisionVeto
  services.ConfirmInput:
    properties:
      binary_hash_confirmed:
        type: string
      genesis_hash_confirmed:
        type: string
      nonce:
        type: string
      operator_address:
        type: string
      pubkey_b64:
        description: |-
          PubKeyB64 is the operator's secp256k1 compressed public key (base64, 33 bytes) used to verify the
          confirmation signature.
        type: string
      signature:
        type: string
      timestamp:
        type: string
    type: object
  services.RaiseInput:
    properties:
      action_type:
        $ref: '#/definitions/proposal.ActionType'
      coordinator_address:
        type: string
      nonce:
        type: string
      payload:
        type: object
      pubkey_b64:
        description: |-
          PubKeyB64 is the signer's compressed secp256k1 pubkey from the ADR-036 StdSignature envelope.
          The verifier asserts it derives to CoordinatorAddr, so it cannot be spoofed.
        type: string
      signature:
        type: string
      timestamp:
        type: string
    type: object
  services.RehearsalResultFact:
    properties:
      attempt_id:
        type: string
      failed_step:
        type: string
      finished_at:
        type: string
      input_set_hash:
        type: string
      launch_id:
        type: string
      outcome:
        type: string
      rehearsal:
        $ref: '#/definitions/services.RehearsalResultFactMeta'
      schema_version:
        type: integer
      service_pubkey:
        type: string
      signature:
        type: string
      started_at:
        type: string
      steps:
        items:
          $ref: '#/definitions/services.RehearsalResultFactStep'
        type: array
      summary:
        type: string
    type: object
  services.RehearsalResultFactMeta:
    properties:
      binary_name:
        type: string
      binary_sha256:
        type: string
      binary_version:
        type: string
      blocks_advanced:
        type: integer
      engine_version:
        type: string
      validators:
        type: integer
    type: object
  services.RehearsalResultFactStep:
    properties:
      detail:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
  services.SignInput:
    properties:
      coordinator_address:
        type: string
      decision:
        $ref: '#/definitions/proposal.Decision'
      nonce:
        type: string
      pubkey_b64:
        description: |-
          PubKeyB64 is the signer's compressed secp256k1 pubkey from the ADR-036 StdSignature envelope.
          The verifier asserts it derives to CoordinatorAddr, so it cannot be spoofed.
        type: string
      signature:
        type: string
      timestamp:
        type: string
    type: object
  services.SubmitInput:
    properties:
      chain_id:
        type: string
      gentx:
        type: object
      memo:
        type: string
      nonce:
        type: string
      operator_address:
        type: string
      peer_address:
        type: string
      pubkey_b64:
        description: |-
          PubKeyB64 is the operator's secp256k1 compressed public key (base64, 33 bytes) used to verify the
          request signature. Distinct from the consensus key, which is extracted from the gentx.
        type: string
      rpc_endpoint:
        type: string
      signature:
        type: string
      timestamp:
        type: string
    type: object
  services.VerifyChallengeInput:
    properties:
      challenge:
        type: string
      nonce:
        description: |-
          Nonce is included in the signed bytes (replay protection) and consumed once
          per (operator, nonce) by the nonce store.
        type: string
      operator_address:
        type: string
      pubkey_b64:
        description: |-
          PubKeyB64 is the caller's secp256k1 compressed public key (33 bytes, base64-encoded).
          Required so the server can verify the signature — bech32 addresses are hashes
          and the public key cannot be recovered from them.
          Stripped before signing — not included in the canonical bytes.
        type: string
      signature:
        description: Signature is stripped before signing — not included in the canonical
          bytes.
        type: string
      timestamp:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Chain launch coordination server. Coordinators and validators authenticate
    via secp256k1 challenge-response (ADR-036)
  title: ChainCoord API
  version: "1.0"
paths:
  /admin/coordinators:
    get:
      description: Returns all addresses on the coordinator allowlist. Admin only.
        Paginated.
      parameters:
      - description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.pageEnvelope-array_api_coordinatorAllowlistEntryJSON'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: List coordinator allowlist
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Adds an address to the coordinator allowlist. Admin only. Idempotent.
      parameters:
      - description: Address to add
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.addCoordinatorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.coordinatorAllowlistEntryJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Add coordinator to allowlist
      tags:
      - admin
  /admin/coordinators/{address}:
    delete:
      description: Removes an address from the coordinator allowlist. Admin only.
      parameters:
      - description: Operator address to remove
        in: path
        name: address
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Remove coordinator from allowlist
      tags:
      - admin
  /admin/sessions/{address}:
    delete:
      parameters:
      - description: Operator address
        in: path
        name: address
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Revoke all sessions for an operator (admin)
      tags:
      - admin
  /audit/pubkey:
    get:
      description: Returns the server's Ed25519 public key for offline audit log signature
        verification.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.auditPubKeyResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Get audit public key
      tags:
      - audit
  /auth/challenge:
    post:
      consumes:
      - application/json
      description: Issues a short-lived challenge for the given operator address.
        Rate-limited to 10 req/IP/min and 5 req/operator/5min.
      parameters:
      - description: Operator address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.challengeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
