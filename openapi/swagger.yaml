      runner_id:
        type: string
    type: object
  api.rehearsalGentxJSON:
    properties:
      consensus_pubkey:
        type: string
      gentx:
        type: object
      moniker:
        type: string
      operator_address:
        type: string
      self_delegation:
        type: string
    type: object
  api.rehearsalInputJSON:
    properties:
      allocations:
        additionalProperties:
          $ref: '#/definitions/api.rehearsalAllocJSON'
        type: object
      attempt_id:
        type: string
      chain:
        $ref: '#/definitions/api.rehearsalChainJSON'
      generated_at:
        type: string
      gentxs:
        items:
          $ref: '#/definitions/api.rehearsalGentxJSON'
        type: array
      input_set_hash:
        type: string
      launch_id:
        type: string
      schema_version:
        type: integer
      status:
        type: string
    type: object
  api.rehearsalLeaseConflictJSON:
    properties:
      claimed_at:
        type: string
      claimed_by:
        type: string
      lease_expires_at:
        type: string
    type: object
  api.rehearsalResultAckJSON:
    properties:
      attempt_id:
        type: string
      launch_id:
        type: string
      outcome:
        type: string
      recorded_at:
        type: string
      stale:
        type: boolean
