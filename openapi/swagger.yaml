      - BearerAuth: []
      summary: List proposals
      tags:
      - proposals
  /launch/{id}/ready:
    post:
      consumes:
      - application/json
      description: Validator submits a signed readiness confirmation. Rate-limited
        to 60 req/IP/min.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Readiness confirmation
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.ConfirmInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.readinessConfirmJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Confirm readiness
      tags:
      - readiness
  /launch/{id}/rehearsal:
    get:
      description: |-
        Returns the launch's recorded rehearsal results — outcome, which step failed, the
        input-set hash the run consumed, and a `stale` flag (the approved inputs changed
        since the run) — newest first. Committee members only.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.rehearsalResultJSON'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Rehearsal results (committee read-back)
      tags:
      - rehearsal
  /launch/{id}/rehearsal/{attempt_id}/reset:
    post:
      description: |-
        Coordinator override that returns a stuck (crashed-runner) rehearsal attempt to OPEN so
        the run can be re-claimed before the lease TTL expires. Committee members only.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Attempt UUID
        in: path
        name: attempt_id
        required: true
        type: string
      responses:
        "204":
          description: Lease reset
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Reset a rehearsal run lease
      tags:
      - rehearsal
  /launches:
    get:
      description: Returns a paginated list of launches. Visibility is filtered based
        on auth status.
      parameters:
      - description: Page number
        in: query
        minimum: 1
