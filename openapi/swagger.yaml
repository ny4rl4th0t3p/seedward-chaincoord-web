      monitor_rpc_url:
        type: string
      rehearsal_endpoint:
        type: string
      rehearsal_service_pubkey:
        description: Bridge fields — operational, settable at any status.
        type: string
      repo_commit:
        type: string
      repo_url:
        type: string
      total_supply:
        type: string
    type: object
  api.peerJSON:
    properties:
      operator_address:
        type: string
      peer_address:
        type: string
    type: object
  api.peersResponse:
    properties:
