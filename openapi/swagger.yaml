          description: OK
          schema:
            $ref: '#/definitions/api.pageEnvelope-array_api_launchJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: List launches
      tags:
      - launches
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Session token obtained from POST /auth/verify. Format: "Bearer <token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
