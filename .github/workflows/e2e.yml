name: E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual "Run workflow" button + `gh workflow run e2e.yml`

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: playwright (real coordd)
    runs-on: ubuntu-latest
    steps:
      # The web app (this repo) at the workspace root.
      - uses: actions/checkout@v4

      # Run against the PUBLISHED coordd release — the exact binary users run, and the version the
      # vendored OpenAPI spec + WASM pin match — rather than a source build of coordd's main. More
      # reproducible + faster (no Go toolchain / compile). Bump COORDD_VERSION when the web targets
      # a newer coordd release.
      - name: Download coordd release binary
        env:
          COORDD_VERSION: v1.0.0-rc2
        run: |
          asset="seedward-chaincoord_${COORDD_VERSION#v}_linux_amd64.tar.gz"
          url="https://github.com/ny4rl4th0t3p/seedward-chaincoord/releases/download/${COORDD_VERSION}/${asset}"
          echo "Downloading ${url}"
          curl -fsSL -o coordd.tar.gz "${url}"
          mkdir -p coordd-bin && tar xzf coordd.tar.gz -C coordd-bin
          chmod +x coordd-bin/coordd
          echo "COORDD_BIN=$(pwd)/coordd-bin/coordd" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install web deps
        run: yarn install --frozen-lockfile

      - name: Vendor gentxvalidate WASM (advisory validator)
        run: yarn sync:wasm   # pinned-release download — the same artifact path a live deploy uses

      - name: Install Playwright chromium
        # `yarn playwright` resolves to the package.json script (`playwright test`), so call the CLI
        # directly for the browser install — otherwise it becomes `playwright test install …`.
        run: npx playwright install --with-deps chromium

      - name: Playwright
        # COORDD_BIN is exported into $GITHUB_ENV by the download step above.
        run: yarn playwright

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7