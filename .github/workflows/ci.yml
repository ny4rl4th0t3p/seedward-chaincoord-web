name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual "Run workflow" button + `gh workflow run ci.yml`

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test · spec-drift · wasm-pin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn tsc --noEmit

      - name: Lint
        run: yarn lint

      # Prints the coverage table to the job log (text reporter) and fails if any metric drops
      # below the ratchet floor in jest.config.js (coverageThreshold).
      - name: Unit tests + coverage gate
        run: yarn test:coverage

      # Persist the full report (lcov HTML + coverage-summary.json) as a downloadable artifact,
      # even when the gate fails, so the numbers are inspectable after the run.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      # The API client is generated from the vendored OpenAPI spec (openapi/swagger.yaml).
      # Regenerate and fail if the committed client under api/generated has drifted.
      - name: API client in sync with the vendored spec
        run: |
          yarn gen:api
          if ! git diff --quiet -- api/generated; then
            echo "::error::Generated API client is stale — run 'yarn gen:api' and commit api/generated."
            git --no-pager diff --stat -- api/generated
            exit 1
          fi

      # The vendored gentxvalidate WASM pin must match the seedward-libs version coordd's LATEST RELEASE
      # depends on — else the advisory client runs a different validator than the authoritative server.
      - name: WASM validator pin matches coordd's latest release
        run: yarn check:wasm-version