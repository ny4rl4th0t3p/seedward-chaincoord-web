name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual "Run workflow" button + `gh workflow run ci.yml`

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test · spec-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn tsc --noEmit

      - name: Lint
        run: yarn lint

      - name: Unit tests
        run: yarn test

      # The API client is generated from the vendored OpenAPI spec (openapi/swagger.yaml).
      # Regenerate and fail if the committed client under api/generated has drifted.
      - name: API client in sync with the vendored spec
        run: |
          yarn gen:api
          if ! git diff --quiet -- api/generated; then
            echo "::error::Generated API client is stale — run 'yarn gen:api' and commit api/generated."
            git --no-pager diff --stat -- api/generated
            exit 1
          fi